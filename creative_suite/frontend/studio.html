<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PANTHEON</title>
  <link rel="stylesheet" href="/static/studio.css">
</head>
<body>
  <div id="app-grid">

    <header id="headerbar">
      <span id="logo-text">PANTHEON</span>

      <div id="mode-switch" role="tablist" aria-label="Cockpit mode">
        <button class="mode-btn active" data-mode="studio"   role="tab" aria-selected="true">STUDIO</button>
        <button class="mode-btn"        data-mode="lab"      role="tab" aria-selected="false">LAB</button>
        <button class="mode-btn"        data-mode="creative" role="tab" aria-selected="false">CREATIVE</button>
      </div>

      <div id="header-center">
        <select id="part-select" title="Select part"></select>
      </div>

      <div id="transport">
        <button id="btn-rew" title="Rewind">◀◀</button>
        <button id="btn-play" title="Play">▶</button>
        <button id="btn-fwd" title="Forward">▶▶</button>
      </div>

      <div id="header-right">
        <button id="btn-rebuild" class="btn-primary">REBUILD</button>
      </div>
    </header>

    <nav id="sidebar">
      <div id="nav-list" data-active-mode="studio"><!-- populated by studio-pages.js --></div>
    </nav>

    <main id="main-area">
      <div id="panel-slot" class="panel-placeholder">Select a panel</div>
    </main>

    <footer id="statusbar">
      <span id="status-mode-chip" class="status-mode studio">STUDIO</span>
      <span id="status-text">Ready</span>
    </footer>

  </div>

  <!-- vendor libs (unchanged order) -->
  <script src="/vendor/wavesurfer.js"></script>
  <script src="/vendor/wavesurfer-multitrack.js"></script>
  <script src="/vendor/animation-timeline.js"></script>
  <script src="/vendor/litegraph.js"></script>
  <script src="/vendor/tweakpane.js"></script>
  <script src="/vendor/mp4box.js"></script>
  <script src="/vendor/theatre-core-studio.js"></script>

  <!-- App core -->
  <script src="/static/studio-store.js"></script>
  <script src="/static/studio-app.js"></script>

  <!-- STUDIO panels (sub-panels for EDIT tab) -->
  <script src="/static/studio-preview.js"></script>
  <script src="/static/studio-timeline.js"></script>
  <script src="/static/studio-audio.js"></script>
  <script src="/static/studio-litegraph.js"></script>
  <script src="/static/studio-inspector.js"></script>
  <!-- STUDIO top-level tabs -->
  <script src="/static/studio-clips.js"></script>
  <script src="/static/studio-edit.js"></script>

  <!-- LAB panels (new) -->
  <script src="/static/lab-demos.js"></script>
  <script src="/static/lab-extraction.js"></script>
  <script src="/static/lab-patterns.js"></script>
  <script src="/static/lab-annotate.js"></script>
  <script src="/static/lab-flags.js"></script>
  <script src="/static/lab-forge.js"></script>
  <script src="/static/lab-engine.js"></script>

  <!-- CREATIVE panels (new) -->
  <script src="/static/creative-textures.js"></script>
  <script src="/static/creative-sprites.js"></script>
  <script src="/static/creative-skins.js"></script>
  <script src="/static/creative-maps.js"></script>
  <script src="/static/creative-md3.js"></script>
  <script src="/static/creative-prompts.js"></script>
  <script src="/static/creative-queue.js"></script>
  <script src="/static/creative-packs.js"></script>

  <!-- Router LAST -->
  <script src="/static/studio-pages.js"></script>
</body>
</html>
